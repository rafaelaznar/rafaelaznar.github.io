<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="cache-control" content="no-cache, must-revalidate, post-check=0, pre-check=0">
  <meta http-equiv="expires" content="0">
  <meta http-equiv="pragma" content="no-cache">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>systematic record</title>

  <!-- marked.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.2.5/marked.min.js"
    integrity="sha512-5JZDwulT+S/K8p/KO4tikNKA5t6Ebb+tqPwT7Ma+lVpJuS4G+Z0lSktWcl8hymXeFqCprGEuKGOCrKjyulql/A=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <style>
    /* ── Layout ─────────────────────────────────────────────────── */
    .container {
      max-width: 960px;
      margin: 0.1em auto;
      padding: 1em;
    }

    /* ── Typography ─────────────────────────────────────────────── */
    body {
      font-family: Arial, "Roboto", sans-serif;
      font-size: 1rem;
    }

    @media (max-width: 1200px) { body { font-size: 1.2rem; } }
    @media (max-width: 1000px) { body { font-size: 1rem;   } }
    @media (max-width:  684px) { body { font-size: 0.8rem; } }
    @media (max-width:  382px) { body { font-size: 0.7rem; } }

    a:active { background-color: rgb(255, 238, 0); }

    p {
      text-align: justify;
      text-justify: inter-word;
      margin: 0 0 2em 0 !important;
    }

    h1, h2, h3, h4, h5, h6 {
      font-weight: bold;
      padding: 0;
      line-height: 1.2;
      clear: left;
      color: #6c757d !important;
      font-family: Helvetica, sans-serif, Arial;
    }

    h1 {
      font-weight: 500 !important;
      margin: 1em 0em !important;
      text-align: center;
      border-style: dashed;
      border-width: 2px;
      border-color: #6c757d;
      padding: 0.7em 0;
      color: #6c757d !important;
    }

    h2 {
      font-size: 1.5em;
      margin: 0 0 0.866em;
      border-bottom-style: double;
      border-bottom-width: 6px;
    }

    h3 { font-size: 1.125em; margin: 0 0 0.888em; }
    h4 { font-size: 1em;     margin: 0 0 1.0em;   }
    h5 { font-size: .875em;  margin: 0 0 1.1428em; }
    h6 { font-size: .75em;   margin: 0 0 1.333em;  }

    /* ── Tables ─────────────────────────────────────────────────── */
    table            { border-collapse: collapse; }
    th               { background-color: #e9e9e9; }
    table, th, td    { border: 1px solid; }
    th, td           { padding: 5px; text-align: left; }

    /* ── Images ─────────────────────────────────────────────────── */
    img { display: block; margin: 0 auto; }

    /* ── Code blocks ─────────────────────────────────────────────── */
    pre {
      font-size: .8rem;
      border-style: dotted;
      border-color: #818181;
      border-width: 2px;
      background: #f4f4f4;
      padding: 10px;
      white-space: pre-wrap;       /* CSS 2.1        */
      white-space: -moz-pre-wrap;  /* Mozilla 1999   */
      white-space: -pre-wrap;      /* Opera 4-6      */
      white-space: -o-pre-wrap;    /* Opera 7        */
      word-wrap: break-word;       /* IE 5.5+        */
    }

    /* ── Page-link bar ───────────────────────────────────────────── */
    #page-links {
      text-align: center;
      margin-top: 4em;
      font-size: 0.85em;
      color: #6c757d;
    }

    /* ── Loading indicator ───────────────────────────────────────── */
    #content.loading::after {
      content: "Loading…";
      display: block;
      text-align: center;
      color: #6c757d;
      padding: 2em 0;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Header fragment (assets/header.html) -->
    <div id="site-header"></div>

    <!-- Main markdown content -->
    <div id="content" class="loading"></div>

    <!-- GitHub edit / source links -->
    <div id="page-links"></div>

    <!-- Footer fragment (assets/footer.html) -->
    <div id="site-footer"></div>
  </div>

  <script>
    // ── Configuration ────────────────────────────────────────────────────────
    //   Adjust these two values to match your GitHub Pages repository.
    //   For a user/org site   → GITHUB_REPO = '<username>.github.io'
    //   For a project site    → GITHUB_REPO = '<project-name>'
    const GITHUB_USER = 'rafaelaznar';              // ← your GitHub username
    const GITHUB_REPO = GITHUB_USER + '.github.io'; // ← your repository name

    const ASSETS_BASE  = 'assets/';
    const GITHUB_ROOT  = 'https://github.com/' + GITHUB_USER + '/' + GITHUB_REPO;
    const RAW_BRANCH   = 'main';                  // or 'main', depending on your repo

    // ── Resolve a relative path against the current page path ────────────────
    //   e.g.  resolvePath('posts/2023.01.23.01.md', '../home.md') → 'home.md'
    //         resolvePath('home.md', 'posts/2023.01.23.01.md')   → 'posts/2023.01.23.01.md'
    function resolvePath(currentPage, href) {
      const dir = currentPage.includes('/')
        ? currentPage.slice(0, currentPage.lastIndexOf('/') + 1)
        : '';
      const segments = (dir + href).split('/');
      const resolved = [];
      for (const seg of segments) {
        if (seg === '..') {
          resolved.pop();
        } else if (seg !== '.' && seg !== '') {
          resolved.push(seg);
        }
      }
      return resolved.join('/');
    }

    // ── Determine the current page from the URL hash ──────────────────────────
    function currentPage() {
      const hash = decodeURIComponent(location.hash.slice(1));
      return hash || 'home.md';
    }

    // ── Rewrite .md links inside an element to use hash-based navigation ──────
    //   This makes them work as SPA links in the browser while the raw .md
    //   files remain valid relative links when browsed on github.com directly.
    function rewriteMdLinks(containerEl, page) {
      containerEl.querySelectorAll('a[href]').forEach(function (link) {
        const href = link.getAttribute('href');
        // Only rewrite local .md links (not http/https, not anchors)
        if (href && href.endsWith('.md') && !/^https?:\/\//i.test(href)) {
          const resolved = resolvePath(page, href);
          link.setAttribute('href', '#' + resolved);
        }
      });
    }

    // ── Fetch and render a markdown page ─────────────────────────────────────
    async function loadPage(page) {
      const contentEl  = document.getElementById('content');
      const linksEl    = document.getElementById('page-links');

      contentEl.classList.add('loading');
      contentEl.innerHTML = '';
      linksEl.innerHTML   = '';

      const fileURL = ASSETS_BASE + page;

      try {
        const response = await fetch(fileURL);
        if (!response.ok) {
          throw new Error(response.status + ' ' + response.statusText);
        }
        const markdown = await response.text();

        contentEl.classList.remove('loading');
        contentEl.innerHTML = marked.parse(markdown);
        rewriteMdLinks(contentEl, page);

        // GitHub edit / source links (mirrors the Angular app's template)
        const basePath  = ASSETS_BASE + page;
        const editURL   = GITHUB_ROOT + '/edit/'   + RAW_BRANCH + '/' + basePath;
        const sourceURL = GITHUB_ROOT + '/blob/'   + RAW_BRANCH + '/' + basePath;

        linksEl.innerHTML =
          '<a href="' + editURL   + '">edit this page in github</a>' +
          ' | ' +
          '<a href="' + sourceURL + '">page source in github</a>';

      } catch (err) {
        contentEl.classList.remove('loading');
        contentEl.innerHTML =
          '<p style="color:red">Could not load <code>' + fileURL + '</code>: ' +
          err.message + '</p>';
      }

      // Scroll to top on page change
      window.scrollTo(0, 0);
    }

    // ── Load a static HTML fragment (header / footer) ────────────────────────
    async function loadFragment(elementId, path) {
      try {
        const response = await fetch(path);
        if (response.ok) {
          const el = document.getElementById(elementId);
          el.innerHTML = await response.text();
          // Rewrite any .md links inside the fragment so they use hash nav too
          rewriteMdLinks(el, '');
        }
      } catch (_) { /* silently ignore — fragments are optional */ }
    }

    // ── Bootstrap ─────────────────────────────────────────────────────────────
    loadFragment('site-header', ASSETS_BASE + 'header.html');
    loadFragment('site-footer', ASSETS_BASE + 'footer.html');
    loadPage(currentPage());

    // React to browser back/forward and manual hash changes
    window.addEventListener('hashchange', function () {
      loadPage(currentPage());
    });
  </script>
</body>

</html>
